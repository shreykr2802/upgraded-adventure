# ChromaDB runs embedded (local file storage) — no separate vector DB service.
# This compose file is OPTIONAL: it just containerises the FastAPI backend.
version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./chroma_storage:/app/chroma_storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
